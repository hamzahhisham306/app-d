name: Deploy

# يعمل عند كل دفع على فرع main
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # للسماح بدفع الصورة لـ GHCR

    steps:
      # 1) جلب الكود
      - uses: actions/checkout@v4

      # 2) تحويل اسم الصورة لأحرف صغيرة (GHCR يتطلب ذلك)
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      # 3) تسجيل الدخول إلى GHCR (بالتوكن المدمج تلقائيًا)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4) بناء الصورة ودفعها بوسمين
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # 5) الاتصال بالخادم وتشغيل النشر
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/app
            docker compose pull
            docker compose up -d
            docker image prune -f
